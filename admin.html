<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="busbar-api-base" content="https://busbar-webapp-embedded-v2.onrender.com">
  <title>Busbar Adminoversikt</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="header-top">
      <h1>Busbar Adminoversikt</h1>
      <div class="auth-controls">
        <a href="index.html" class="btn alt nav-page-btn">Åpne prosjektoversikt</a>
        <a href="calculator.html" class="btn alt nav-page-btn">Åpne prisverktøy</a>
      </div>
    </div>
    <p class="muted-text">Read-only innsyn i alle brukeres prosjekter og linjer.</p>
  </header>

  <main class="app-views">
    <section class="card dashboard-card">
      <div class="dashboard-header">
        <div class="dashboard-intro">
          <h2>Admin innlogging</h2>
          <p class="muted-text">Midlertidig admin-login. Sett endelige credentials i backend-miljo.</p>
        </div>
      </div>
      <form id="adminLoginForm" class="project-form admin-login-form" onsubmit="return false;" autocomplete="off">
        <label for="adminUsername">Admin brukernavn
          <input id="adminUsername" type="text" inputmode="text" autocomplete="username" required>
        </label>
        <label for="adminPassword">Admin passord
          <input id="adminPassword" type="password" autocomplete="current-password" required>
        </label>
        <div class="actions">
          <button id="adminLogoutBtn" type="button" class="btn alt">Logg ut</button>
          <button id="adminLoginBtn" type="submit" class="btn">Logg inn</button>
        </div>
      </form>
      <p id="adminAuthError" class="login-error" role="alert"></p>
    </section>

    <section id="adminDataCard" class="card dashboard-card" hidden>
      <div class="dashboard-header">
        <div class="dashboard-intro">
          <h2>Samlet oversikt</h2>
          <p id="adminGeneratedAt" class="muted-text">Sist oppdatert: -</p>
        </div>
        <div class="dashboard-actions">
          <button id="adminRefreshBtn" type="button" class="btn alt">Oppdater</button>
        </div>
      </div>

      <div id="adminSummary" class="admin-summary"></div>

      <h3>Prosjekter</h3>
      <div class="admin-table-wrap">
        <table id="adminProjectsTable" class="admin-table">
          <thead>
            <tr>
              <th><button type="button" class="admin-col-sort-btn" data-table="projects" data-key="email" data-type="text">Epost <span class="sort-indicator">↕</span></button></th>
              <th><button type="button" class="admin-col-sort-btn" data-table="projects" data-key="name" data-type="text">Prosjekt <span class="sort-indicator">↕</span></button></th>
              <th><button type="button" class="admin-col-sort-btn" data-table="projects" data-key="customer" data-type="text">Kunde <span class="sort-indicator">↕</span></button></th>
              <th><button type="button" class="admin-col-sort-btn" data-table="projects" data-key="contactPerson" data-type="text">Kontaktperson <span class="sort-indicator">↕</span></button></th>
              <th><button type="button" class="admin-col-sort-btn" data-table="projects" data-key="lineCount" data-type="number">Linjer <span class="sort-indicator">↕</span></button></th>
              <th><button type="button" class="admin-col-sort-btn" data-table="projects" data-key="totalExFreightRaw" data-type="number">Total stroemskinne ink. frakt <span class="sort-indicator">↕</span></button></th>
              <th><button type="button" class="admin-col-sort-btn" data-table="projects" data-key="dgPercentRaw" data-type="number">DG % <span class="sort-indicator">↕</span></button></th>
              <th><button type="button" class="admin-col-sort-btn" data-table="projects" data-key="createdAtRaw" data-type="date">Opprettet <span class="sort-indicator">↕</span></button></th>
              <th><button type="button" class="admin-col-sort-btn" data-table="projects" data-key="updatedAtRaw" data-type="date">Oppdatert <span class="sort-indicator">↕</span></button></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <h3>Linjer</h3>
      <div class="admin-table-wrap">
        <table id="adminLinesTable" class="admin-table">
          <thead>
            <tr>
              <th><button type="button" class="admin-col-sort-btn" data-table="lines" data-key="email" data-type="text">Epost <span class="sort-indicator">↕</span></button></th>
              <th><button type="button" class="admin-col-sort-btn" data-table="lines" data-key="projectName" data-type="text">Prosjekt <span class="sort-indicator">↕</span></button></th>
              <th><button type="button" class="admin-col-sort-btn" data-table="lines" data-key="lineNumber" data-type="text">Linje <span class="sort-indicator">↕</span></button></th>
              <th><button type="button" class="admin-col-sort-btn" data-table="lines" data-key="series" data-type="text">Serie <span class="sort-indicator">↕</span></button></th>
              <th><button type="button" class="admin-col-sort-btn" data-table="lines" data-key="ampereRaw" data-type="number">Ampere <span class="sort-indicator">↕</span></button></th>
              <th><button type="button" class="admin-col-sort-btn" data-table="lines" data-key="meterRaw" data-type="number">Meter <span class="sort-indicator">↕</span></button></th>
              <th><button type="button" class="admin-col-sort-btn" data-table="lines" data-key="totalExFreightRaw" data-type="number">Total stroemskinne ink. frakt <span class="sort-indicator">↕</span></button></th>
              <th><button type="button" class="admin-col-sort-btn" data-table="lines" data-key="dgPercentRaw" data-type="number">DG % <span class="sort-indicator">↕</span></button></th>
              <th><button type="button" class="admin-col-sort-btn" data-table="lines" data-key="updatedAtRaw" data-type="date">Oppdatert <span class="sort-indicator">↕</span></button></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <script type="module" src="admin.js"></script>
</body>
</html>
